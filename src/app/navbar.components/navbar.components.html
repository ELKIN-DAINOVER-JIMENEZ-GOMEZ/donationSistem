<nav 
  class="navbar fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [class.scrolled]="isScrolled">
  
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      
      <!-- Logo -->
      <div class="flex items-center space-x-3 group cursor-pointer">
        <div class="logo-circle">
          <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" 
                  d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
          </svg>
        </div>
        <span class="logo-text">DonaVida</span>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a (click)="scrollToSection('inicio')" class="nav-link">Inicio</a>
        <a (click)="scrollToSection('donaciones')" class="nav-link">Donaciones</a>
        <a (click)="scrollToSection('impacto')" class="nav-link">Nuestro Impacto</a>
        <a (click)="scrollToSection('comunidad')" class="nav-link">Comunidad</a>
      </div>

      <!-- Auth Buttons + Theme Toggle -->
      <div class="hidden md:flex items-center space-x-4">

        <!-- Botón Sol / Luna -->
        <button 
          (click)="toggleTheme()"
          class="theme-toggle-btn"
          [class.light-active]="isLightMode"
          [attr.title]="isLightMode ? 'Cambiar a modo oscuro' : 'Cambiar a modo claro'">
          
          <!-- Sol (visible en modo oscuro → activa modo claro) -->
          <svg *ngIf="!isLightMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>

          <!-- Luna (visible en modo claro → activa modo oscuro) -->
          <svg *ngIf="isLightMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <button routerLink="/login" class="btn-secondary">Iniciar Sesión</button>
        <button routerLink="/register" class="btn-primary">Registrarse</button>
      </div>

      <!-- Mobile: Theme toggle + Hamburger -->
      <div class="md:hidden flex items-center gap-2">
        <button 
          (click)="toggleTheme()"
          class="theme-toggle-btn"
          [class.light-active]="isLightMode">
          <svg *ngIf="!isLightMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg *ngIf="isLightMode" class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>

        <button 
          (click)="toggleMobileMenu()"
          class="mobile-menu-btn"
          [class.active]="isMobileMenuOpen">
          <span class="line line-1"></span>
          <span class="line line-2"></span>
          <span class="line line-3"></span>
        </button>
      </div>

    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu md:hidden" [class.open]="isMobileMenuOpen">
    <div class="mobile-menu-content">
      <a (click)="scrollToSection('inicio')" class="mobile-nav-link">Inicio</a>
      <a (click)="scrollToSection('donaciones')" class="mobile-nav-link">Donaciones</a>
      <a (click)="scrollToSection('impacto')" class="mobile-nav-link">Nuestro Impacto</a>
      <a (click)="scrollToSection('comunidad')" class="mobile-nav-link">Comunidad</a>
      <div class="mobile-auth-buttons">
        <button routerLink="/login" class="btn-secondary w-full">Iniciar Sesión</button>
        <button routerLink="/register" class="btn-primary w-full">Registrarse</button>
      </div>
    </div>
  </div>
</nav>
